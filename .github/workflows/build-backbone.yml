name: Build Fluxcraft Backbone

on:
  workflow_dispatch:
    inputs:
      force:
        type: boolean
        description: Force a new build and overwrite cache

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Generate cache buster
        id: cache-buster
        if: github.event.inputs.force == 'true'
        run: echo "ts=-$(date +%s)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        id: cache-rust-build
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            fluxcraft-rs/target
            fluxcraft-rs/crates/fluxcraft-wasm/pkg
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/*.rs') }}${{steps.cache-buster.outputs.ts}}

      - name: Early exit if cache hit and not forced
        if: steps.cache-rust-build.outputs.cache-hit == 'true' && github.event.inputs.force != 'true'
        run: |
          echo "Cache hit and force=false. Skipping build."
          exit 0

      # -------------------------
      # Rust build (ensure JNI exists)
      # -------------------------
      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Build all
        working-directory: fluxcraft-rs
        run: cargo build --release

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build FluxCraft WASM package
        working-directory: fluxcraft-rs/crates/fluxcraft-wasm
        env:
          RUSTFLAGS: --cfg getrandom_backend="wasm_js"
        run: wasm-pack build --release

      - name: Verify JNI library
        working-directory: fluxcraft-rs
        run: find target -name "libfluxcraft_jni.so"

      - name: Verify WASM build
        run: ls fluxcraft-rs/crates/fluxcraft-wasm/pkg
