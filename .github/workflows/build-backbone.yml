name: Build Fluxcraft Backbone

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # -------------------------
      # Rust build (ensure JNI exists)
      # -------------------------
      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Build all
        working-directory: fluxcraft-rs
        run: cargo build --release

      - name: Upload JNI library
        uses: actions/upload-artifact@v4
        with:
          name: fluxcraft-jni
          path: fluxcraft-rs/target/release/libfluxcraft_jni.so

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build FluxCraft WASM package
        working-directory: fluxcraft-rs/crates/fluxcraft-wasm
        env:
          RUSTFLAGS: --cfg getrandom_backend="wasm_js"
        run: wasm-pack build --release

      - name: Upload WASM
        uses: actions/upload-artifact@v4
        with:
          name: fluxcraft-wasm
          path: fluxcraft-rs/crates/fluxcraft-wasm/pkg
